<!DOCTYPE html>
<html>
<head>
    <title>AI Vegan Dietitian</title>
    <style>
        /* Modern Layout Setup */
        body { 
            display: flex; 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #f8f9fa;
            min-height: 100vh;
        }

        /* Sidebar Styling */
        #sidebar {
            width: 260px;
            background-color: #1a2a1a; 
            color: white;
            padding: 30px 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            height: 100vh;
        }

        #sidebar h3 { border-bottom: 2px solid #4CAF50; padding-bottom: 10px; }
        #sidebar label { display: block; margin-top: 20px; font-size: 0.9em; color: #a8dba8; }

        #sidebar select, #sidebar input[type="range"] {
            width: 100%; margin-top: 5px; background: #2d3e2d;
            color: white; border: 1px solid #455a45; padding: 8px; border-radius: 5px;
        }

        /* Main Content Container */
        .container {
            flex-grow: 1; 
            padding: 50px;
            max-width: 900px;
            margin: 0 auto;
        }

        h1 { color: #2e7d32; margin-bottom: 5px; }
        .subtitle { color: #666; margin-bottom: 30px; }
        
        .input-group { margin-top: 20px; display: flex; gap: 10px; margin-bottom: 30px; }
        input[type="text"] { flex-grow: 1; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 1em; }
        
        button { padding: 10px 25px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #218838; transform: translateY(-1px); }

        /* Result Area Styling */
        #result { 
            margin-top: 25px; 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border-left: 6px solid #28a745;
            display: none; /* Hidden until search */
        }

        .hidden { display: none; }

        #meal-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover; 
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #eee;
            transition: transform 0.3s ease;
        }

        #aiText {
            white-space: pre-wrap; 
            line-height: 1.6;
            color: #333;
            font-size: 1.05em;
        }

        .sidebar-footer { font-size: 0.8em; color: #888; margin-top: 50px; line-height: 1.3; }
    /* When the AI is listening, the button turns red and pulses */
.listening {
    background-color: #ff4b2b !important;
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

.input-error {
    border: 2px solid #ff4b2b !important;
    animation: shake 0.2s ease-in-out 0s 2;
}

@keyframes shake {
    0% { margin-left: 0rem; }
    25% { margin-left: 0.5rem; }
    75% { margin-left: -0.5rem; }
    100% { margin-left: 0rem; }
}

    </style>
</head>
<body>

    <div id="loginOverlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; display: flex; justify-content: center; align-items: center;">
    <div style="background: white; padding: 30px; border-radius: 15px; text-align: center; width: 300px;">
        <h2 style="color: #2d6a4f;">🌿 VeganAI Login</h2>
        <input type="text" id="userLogin" placeholder="Username" style="width: 90%; padding: 10px; margin-bottom: 10px;">
        <input type="password" id="passLogin" placeholder="Password" style="width: 90%; padding: 10px; margin-bottom: 20px;">
        
        <button onclick="closeLogin()" style="width: 100%; padding: 10px; background: #2d6a4f; color: white; border: none; border-radius: 5px; cursor: pointer; margin-bottom: 10px;">Login</button>
        
        <button onclick="closeLogin()" style="width: 100%; padding: 10px; background: #6c757d; color: white; border: none; border-radius: 5px; cursor: pointer;">Continue as Guest</button>
    </div>
</div>

    <div id="sidebar">
        <h3>👤 My Profile</h3>
        <p style="font-size: 0.85em; color: #4CAF50;">Focus: Anemia, Low Energy</p>
        
        <label>Daily Goal:</label>
        <select id="userGoal">
            <option value="iron">Boost Iron (Anemia)</option>
            <option value="energy">High Energy</option>
            <option value="protein">Muscle Building</option>
        </select>

        <label>Activity Level:</label>
        <input type="range" min="1" max="5" value="3" id="activityLevel">
        
        <p class="sidebar-footer">This profile helps our Gemini 2.5 model tailor recipes to your specific health needs.</p>
    </div>

   <div class="container">
    <h1>🌿 AI Vegan Dietitian</h1>
    <p class="subtitle">Personalized plant-based nutrition</p>

    <h1 style="color: red;">DEBUG: SYSTEM UPDATED</h1> 

    <div class="input-group">
        <input type="text" id="cravingInput" placeholder="What are you craving?">
        
        <button id="voiceBtn" onclick="startVoice()" style="background: #4a4a4a; padding: 10px; border: none; border-radius: 5px; cursor: pointer; margin: 0 5px;">
            🎤
        </button>
        
        <button onclick="getAdvice()">Get Advice</button>
    </div>

    <div id="result">
        <div id="image-container" class="hidden">
            <img id="meal-image" src="" alt="Meal Preview">
        </div>
        <div id="aiText">Consulting the AI Dietitian...</div>
    </div>
</div>

<div class="input-group">
    <input type="text" id="cravingInput" placeholder="What are you craving?">
    
    <button id="voiceBtn" onclick="startVoice()" style="background: #4a4a4a; padding: 10px; border: none; border-radius: 5px; cursor: pointer; margin: 0 5px;">
        🎤
    </button>
    
    <button onclick="getAdvice()">Get Advice</button>
</div>

    <script>

        function login() {
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;

    // BTech Demo Logic: Simple check
    if (user === "admin" && pass === "1234") {
        window.location.href = "/dashboard"; // This links to index.html
    } else {
        alert("Invalid credentials! Try admin / 1234");
    }
}
        async function getAdvice() {
            const name = document.getElementById('userName').value;
            const craving = document.getElementById('cravingInput').value;
            const goal = document.getElementById('userGoal').value;
            const resultDiv = document.getElementById('result');
            const aiText = document.getElementById('aiText');
            const imageContainer = document.getElementById('image-container');
            const mealImg = document.getElementById('meal-image');

            if (!craving) return;

            if (!name.trim() || !craving.trim()) {
        alert("Please enter both your name and what you're craving!");
        return; // Stop the function here
    }

            // 1. Show the result box and loading state
            resultDiv.style.display = 'block';
            imageContainer.classList.add('hidden');
            aiText.innerText = "👨‍🍳 Planning your vegan meal...";

            try {
                // --- STEP 1: GET THE RECIPE ---
                const response = await fetch('/generate-recipe/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        craving: craving, 
                        health: goal 
                    })
                });

                const recipeData = await response.json();
                
                if (recipeData.ai_recommendation) {
                    aiText.innerText = recipeData.ai_recommendation;

                    await new Promise(resolve => setTimeout(resolve, 2000));
                    
                    // --- STEP 2: GET THE IMAGE ---
                    // We send the craving + goal to make a great image
                    const mealNameForImage = craving + " " + goal;
                    
                    const imageResponse = await fetch(`/generate-image/?meal_name=${encodeURIComponent(mealNameForImage)}`);
                    const imageData = await imageResponse.json();

                    if (imageData.image_data) {
                        mealImg.src = imageData.image_data;
                        imageContainer.classList.remove('hidden');
                    }
                }

            } catch (error) {
                console.error("Error:", error);
                aiText.innerText = "Connection Error. Make sure your Python server is running!";
            }
        }

        function startVoice() {
    const voiceBtn = document.getElementById('voiceBtn');
    const cravingInput = document.getElementById('cravingInput');

    // Check if the browser supports Speech Recognition
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (!SpeechRecognition) {
        alert("Your browser does not support voice input. Try Chrome!");
        return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.interimResults = false;

    // Start UI feedback
    voiceBtn.classList.add('listening');
    cravingInput.placeholder = "Listening... speak now!";

    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        cravingInput.value = transcript;
        voiceBtn.classList.remove('listening');
        
        // AUTO-TRIGGER: This makes the demo look like magic
        setTimeout(() => {
            getAdvice(); 
        }, 500);
    };

    recognition.onerror = (event) => {
        console.error("Speech error:", event.error);
        voiceBtn.classList.remove('listening');
        cravingInput.placeholder = "Error hearing you. Try again.";
    };

    recognition.onend = () => {
        voiceBtn.classList.remove('listening');
    };

    recognition.start();
}
if (!name.trim()) {
    document.getElementById('userName').classList.add('input-error');
} else {
    document.getElementById('userName').classList.remove('input-error');
}
    </script>
</body>
</html>
